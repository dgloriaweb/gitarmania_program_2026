<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gitármánia Tábor 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hamburger-menu" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </div>
    
    <div class="side-drawer" id="sideDrawer">
        <div class="drawer-header">
            <h3>Globális Keresés</h3>
        </div>
        <div class="search-bar-container">
            <input type="text" id="globalSearchInput" placeholder="Keresés az összes program között...">
        </div>
        <div class="search-results-wrapper" id="searchResultsContainer">
            <p class="search-placeholder">Gépelj a kereséshez az összes nap és helyszín között...</p>
        </div>
    </div>
    <header>
        <p id="current-time" class="current-time"></p>
        <p class="location-micro-label">Aktuális helyszín</p>
        <h2 id="current-venue-title">&lt; Főtér &gt; </h2>
        
        <div class="venue-dots" id="venueDots"></div>

        <div class="day-selector">
            <button class="day-btn active" onclick="switchDay('2026-07-20')">H</button>
            <button class="day-btn" onclick="switchDay('2026-07-21')">K</button>
            <button class="day-btn" onclick="switchDay('2026-07-22')">Sze</button>
            <button class="day-btn" onclick="switchDay('2026-07-23')">Cs</button>
            <button class="day-btn" onclick="switchDay('2026-07-24')">P</button>
            <button class="day-btn" onclick="switchDay('2026-07-25')">Szo</button>
            <button class="day-btn" onclick="switchDay('2026-07-26')">V</button>
        </div>
    </header>

    <div class="slider-wrapper">
        <main class="venue-slider" id="venueSlider">
            <section class="venue-page" data-venue="Főtér" id="venue-Főtér"></section>
            <section class="venue-page" data-venue="1-es előadó" id="venue-1-es előadó"></section>
            <section class="venue-page" data-venue="10-es előadó" id="venue-10-es előadó"></section>
            <section class="venue-page" data-venue="Főépület társalgó" id="venue-Főépület társalgó"></section>
            <section class="venue-page" data-venue="Főépület 24-es terem" id="venue-Főépület 24-es terem"></section>
            <section class="venue-page" data-venue="Büfé" id="venue-Büfé"></section>
            <section class="venue-page" data-venue="Főépület 25-ös terem" id="venue-Főépület 25-ös terem"></section>
            <section class="venue-page" data-venue="Főépület 23-as terem, kis étterem" id="venue-Főépület 23-as terem, kis étterem"></section>
            <section class="venue-page" data-venue="Főépület 26-os terem" id="venue-Főépület 26-os terem"></section>
            <section class="venue-page" data-venue="Főépület 27-es terem" id="venue-Főépület 27-es terem"></section>
            <section class="venue-page" data-venue="Főépület emelet" id="venue-Főépület emelet"></section>
            <section class="venue-page" data-venue="10-es előadó, Főtér" id="venue-10-es előadó, Főtér"></section>
            <section class="venue-page" data-venue="összes terem" id="venue-összes terem"></section>
            <section class="venue-page" data-venue="összes szabad terem" id="venue-összes szabad terem"></section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
